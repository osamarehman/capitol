name: Deploy Strapi Manager to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'strapi-manager/**'
      - '.github/workflows/deploy-strapi-manager.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Strapi Manager
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "strapi-manager/"
          target: "/root/strapi-manager-deploy/"
          strip_components: 0
          overwrite: true

      - name: Deploy and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 5m
          script: |
            set -e
            echo "=== Deploying Strapi Manager ==="

            # Copy package to production location
            cp -r /root/strapi-manager-deploy/strapi-manager/strapi_manager/* /root/strapi_manager/
            cp /root/strapi-manager-deploy/strapi-manager/backup_dashboard.py /root/backup_dashboard.py

            # Install dependencies
            pip3 install -r /root/strapi-manager-deploy/strapi-manager/requirements.txt

            # Restart service
            systemctl restart backup-dashboard

            # Health check with retries
            echo "=== Health check ==="
            MAX_RETRIES=5
            RETRY_COUNT=0
            sleep 3
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -sf http://localhost:5001/ > /dev/null 2>&1; then
                echo "✅ Strapi Manager is healthy!"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Waiting for Strapi Manager... (attempt $RETRY_COUNT/$MAX_RETRIES)"
              sleep 5
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "⚠️ Health check timed out. Checking logs..."
              journalctl -u backup-dashboard --no-pager -n 50
              exit 1
            fi

            # Cleanup
            rm -rf /root/strapi-manager-deploy

            echo "=== Strapi Manager deployment complete ==="

      - name: Deployment Summary
        run: |
          echo "## Strapi Manager Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Production URL:** https://backup.improveitmd.com" >> $GITHUB_STEP_SUMMARY

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Strapi Manager Deployment Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `
            ## Strapi Manager Deployment Failure

            The Strapi Manager deployment pipeline failed.

            - **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Triggered by:** ${{ github.actor }}

            Please check the workflow logs for details.
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment-failure'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['deployment-failure', 'bug']
              });
            }
