name: Deploy Form API to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'form-api/**'
      - '.github/workflows/deploy-form-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Form API
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "form-api/app.py,form-api/requirements.txt"
          target: "/root/form-api-deploy/"
          strip_components: 0
          overwrite: true

      - name: Deploy and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 5m
          script: |
            set -e
            echo "=== Deploying Form API ==="

            # Copy files to production locations
            cp /root/form-api-deploy/form-api/app.py /root/form_submission_app.py
            cp /root/form-api-deploy/form-api/requirements.txt /root/requirements_form.txt

            # Install dependencies
            pip3 install -r /root/requirements_form.txt

            # Restart service
            systemctl restart form-api

            # Health check with retries
            echo "=== Health check ==="
            MAX_RETRIES=5
            RETRY_COUNT=0
            sleep 3
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -sf http://localhost:5000/ > /dev/null 2>&1; then
                echo "✅ Form API is healthy!"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Waiting for Form API... (attempt $RETRY_COUNT/$MAX_RETRIES)"
              sleep 5
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "⚠️ Health check timed out. Checking logs..."
              journalctl -u form-api --no-pager -n 50
              exit 1
            fi

            # Cleanup
            rm -rf /root/form-api-deploy

            echo "=== Form API deployment complete ==="

      - name: Deployment Summary
        run: |
          echo "## Form API Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Production URL:** https://forms.improveitmd.com" >> $GITHUB_STEP_SUMMARY

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Form API Deployment Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `
            ## Form API Deployment Failure

            The Form API deployment pipeline failed.

            - **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Triggered by:** ${{ github.actor }}

            Please check the workflow logs for details.
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment-failure'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['deployment-failure', 'bug']
              });
            }
