services:
  strapi:
    container_name: strapi-prod
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: strapi-prod:latest
    restart: unless-stopped
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: strapiDB
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      NODE_ENV: production
      STRAPI_URL: ${STRAPI_URL}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Syncing schema files from src/api to dist/src/api..."
        for schema in /opt/app/src/api/*/content-types/*/schema.json; do
          dist_schema=$$(echo "$$schema" | sed 's|/opt/app/src/|/opt/app/dist/src/|')
          if [ -f "$$dist_schema" ]; then
            cp "$$schema" "$$dist_schema"
          else
            mkdir -p "$$(dirname "$$dist_schema")"
            cp "$$schema" "$$dist_schema"
          fi
        done
        echo "Schema sync complete."
        exec npm run start
    volumes:
      - strapi-uploads:/opt/app/public/uploads
      - ./src/api:/opt/app/src/api
    ports:
      - "1337:1337"
    networks:
      - strapi-prod
    depends_on:
      strapiDB:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:1337/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  strapiDB:
    container_name: strapi-db-prod
    platform: linux/arm64
    image: postgres:16.0-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - strapi-db-data:/var/lib/postgresql/data
    networks:
      - strapi-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  strapi-uploads:
  strapi-db-data:

networks:
  strapi-prod:
    driver: bridge
