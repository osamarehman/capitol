services:
  strapi:
    container_name: strapi-prod
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: strapi-prod:latest
    restart: unless-stopped
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: strapiDB
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      NODE_ENV: production
      STRAPI_URL: ${STRAPI_URL}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Syncing schema files from src/api to dist/src/api ==="
        for schema in /opt/app/src/api/*/content-types/*/schema.json; do
          dist_schema=$$(echo "$$schema" | sed 's|/opt/app/src/|/opt/app/dist/src/|')
          mkdir -p "$$(dirname "$$dist_schema")"
          cp "$$schema" "$$dist_schema"
        done
        echo "Schema sync complete."

        echo "=== Syncing compiled JS files for content type routes/controllers/services ==="
        for api_dir in /opt/app/src/api/*/; do
          api_name=$$(basename "$$api_dir")
          dist_api="/opt/app/dist/src/api/$$api_name"

          for kind in controllers routes services; do
            src_ts="$$api_dir$$kind/$$api_name.ts"
            dist_js="$$dist_api/$$kind/$$api_name.js"

            # Only process if .ts source exists and .js dist is missing
            if [ -f "$$src_ts" ] && [ ! -f "$$dist_js" ]; then
              # Extract factory function and api uid using sed (busybox compatible)
              factory=$$(sed -n "s/.*factories\.\(createCore[A-Za-z]*\).*/\1/p" "$$src_ts")
              api_uid=$$(sed -n "s/.*factories\.[^'\"]*['\"]\\([^'\"]*\\)['\"].*/\1/p" "$$src_ts")

              if [ -n "$$factory" ] && [ -n "$$api_uid" ]; then
                echo "  Generating $$dist_js ($$factory, $$api_uid)"
                mkdir -p "$$(dirname "$$dist_js")"
                printf '"use strict";\nObject.defineProperty(exports, "__esModule", { value: true });\nconst strapi_1 = require("@strapi/strapi");\nexports.default = strapi_1.factories.%s('\''%s'\'');\n' "$$factory" "$$api_uid" > "$$dist_js"
              else
                echo "  WARN: Could not parse factory/uid from $$src_ts — skipping"
              fi
            fi
          done
        done
        echo "JS sync complete."

        exec npm run start
    volumes:
      - strapi-uploads:/opt/app/public/uploads
      - ./src/api:/opt/app/src/api
    ports:
      - "1337:1337"
    networks:
      - strapi-prod
    depends_on:
      strapiDB:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:1337/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  strapiDB:
    container_name: strapi-db-prod
    platform: linux/arm64
    image: postgres:16.0-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - strapi-db-data:/var/lib/postgresql/data
    networks:
      - strapi-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  strapi-uploads:
  strapi-db-data:

networks:
  strapi-prod:
    driver: bridge
