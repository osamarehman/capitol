services:
  webstudio-prod:
    image: webstudio-prod:latest
    container_name: webstudio-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DOMAINS=cms.improveitmd.com,v2.improveitmd.com
      - DEPLOY_SECRET=${DEPLOY_SECRET:-}
      - DEPLOY_PAGE_PASSWORD=${DEPLOY_PAGE_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
