services:
  webstudio-carolina:
    image: webstudio-carolina:latest
    container_name: webstudio-carolina
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DOMAINS=improveitcarolina.com,improveitmd.com
      - DEPLOY_SECRET=${DEPLOY_SECRET:-}
      - DEPLOY_PAGE_PASSWORD=${DEPLOY_PAGE_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
